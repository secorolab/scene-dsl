name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Checkout rdf-utils
        uses: actions/checkout@v7
        with:
          repository: minhnh/rdf-utils
          path: rdf-utils
      - name: Checkout bdd-dsl
        uses: actions/checkout@v7
        with:
          repository: minhnh/bdd-dsl
          path: bdd-dsl
          ref: devel
      - name: Checkout scene-dsl
        uses: actions/checkout@v7
        with:
          path: scene-dsl
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest
          pip install "./rdf-utils[all]"
          pip install ./bdd-dsl
          pip install ./scene-dsl
      - name: Lint with ruff
        run: |
          ruff check scene-dsl/src scene-dsl/tests
      - name: Test with pytest
        run: |
          pytest -q scene-dsl/tests
